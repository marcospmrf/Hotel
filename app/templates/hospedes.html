<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Hóspedes | Hotel Manager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f8;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
    }

    .tabela-container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th {
      background-color: #ecf0f1;
      color: #2c3e50;
    }

    td {
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Lista de Hóspedes</h1>

  <div class="tabela-container">
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>CPF</th>
          <th>Telefone</th>
          <th>Check-in</th>
          <th>Check-out</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>João da Silva</td>
          <td>123.456.789-00</td>
          <td>(11) 91234-5678</td>
          <td>25/03/2025</td>
          <td>28/03/2025</td>
        </tr>
        <tr>
          <td>Ana Souza</td>
          <td>987.654.321-00</td>
          <td>(21) 99876-5432</td>
          <td>26/03/2025</td>
          <td>30/03/2025</td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
