<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Reservas | Hotel Manager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f8;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
    }

    .tabela-container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 850px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th {
      background-color: #ecf0f1;
      color: #2c3e50;
    }

    td {
      color: #555;
    }

    .pago {
      color: green;
      font-weight: bold;
    }

    .pendente {
      color: orange;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Reservas Atuais</h1>

  <div class="tabela-container">
    <table>
      <thead>
        <tr>
          <th>Reserva</th>
          <th>Hóspede</th>
          <th>Quarto</th>
          <th>Check-in</th>
          <th>Check-out</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>#0015</td>
          <td>Lucas Fernandes</td>
          <td>201</td>
          <td>26/03</td>
          <td>29/03</td>
          <td><span class="pago">Pago</span></td>
        </tr>
        <tr>
          <td>#0016</td>
          <td>Mariana Lima</td>
          <td>105</td>
          <td>27/03</td>
          <td>30/03</td>
          <td><span class="pendente">Pendente</span></td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
