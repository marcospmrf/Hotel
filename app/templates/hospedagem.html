<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quarto 101 | Hotel Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f3f4f6;
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .swiper {
      width: 100%;
      height: 300px;
    }

    .swiper-slide img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    .conteudo {
      padding: 30px;
    }

    .conteudo h2 {
      margin-bottom: 10px;
    }

    .conteudo p {
      margin: 6px 0;
      color: #555;
    }

    form {
      margin-top: 30px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #4f46e5, #3b82f6);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: linear-gradient(to right, #4338ca, #2563eb);
    }

    .cadastro {
      text-align: center;
      margin-top: 16px;
    }

    .cadastro a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }

    .cadastro a:hover {
      text-decoration: underline;
    }

    .botao-alugar {
      display: inline-block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #4f46e5, #3b82f6);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .botao-alugar:hover {
      background: linear-gradient(to right, #4338ca, #2563eb);
    }

  </style>
</head>
<body>
  <div class="container">

    <!-- Carrossel de imagens -->
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide"><img src="quarto1-1.jpg" alt="Vista geral do quarto 1"></div>
        <div class="swiper-slide"><img src="quarto1-2.jpg" alt="Banheiro do quarto 1"></div>
        <div class="swiper-slide"><img src="quarto1-3.jpg" alt="Detalhe da cama"></div>
        <div class="swiper-slide"><img src="quarto1-4.jpg" alt="Varanda do quarto"></div>
      </div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-pagination"></div>
    </div>

    <!-- Informações e formulário -->
    <div class="conteudo">
      <h2>Suíte Luxo - Quarto 101</h2>
      <p><strong>R$ 250,00</strong> por diária</p>
      <p>✅ Ar-condicionado</p>
      <p>✅ Wi-Fi gratuito</p>
      <p>✅ TV a cabo</p>
      <p>✅ Cama King Size</p>

      <form action="/alugar" method="POST">
        <label for="cpf">Digite seu CPF</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
        <a id="btnAlugar" href="{{ url_for('alugar.alugar') }}" class="botao-alugar">Alugar</a>
      </form>

      <div class="cadastro">
        <p>Não tem cadastro?</p>
        <a href="/cadastro">Clique aqui para se cadastrar</a>
      </div>
    </div>
  </div>

  <!-- SwiperJS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
  <script>
    const swiper = new Swiper('.mySwiper', {
      loop: true,
      pagination: {
        el: '.swiper-pagination',
        clickable: true
      },
      navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev'
      },
      slidesPerView: 1,
      spaceBetween: 20
    });
  </script>
  <!-- SwiperJS CDN -->
<script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>

<!-- Scripts locais -->
<script src="{{ url_for('static', filename='js/swiper-init.js') }}"></script>
<script src="{{ url_for('static', filename='js/verificar-cpf.js') }}"></script>
</body>
</html>
