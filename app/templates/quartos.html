<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quartos Disponíveis | Hotel</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f6fa;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
    }

    .header-content {
      max-width: 1100px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-content h1 {
      font-size: 1.5rem;
      margin: 0;
    }

    .btn-add {
      background-color: #2ecc71;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.3s;
    }

    .btn-add:hover {
      background-color: #27ae60;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      background-color: #fff;
    }

    .card-content {
      padding: 15px;
    }

    .card-content h3 {
      margin: 0 0 10px;
    }

    .card-content p {
      margin: 4px 0;
      color: #555;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 16px;
      background-color: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.3s;
    }

    .btn:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1>Quartos Disponíveis</h1>
      <a href="{{ url_for('novoquarto.novoquarto') }}" class="btn-add">+ Novo Quarto</a>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <img src="{{ url_for('static', filename='img/quarto1.png.webp') }}" alt="Quarto 101">
      <div class="card-content">
        <h3>Quarto 101 - Suíte</h3>
        <p>R$ 250,00 / diária</p>
        <p>Ar-condicionado, Wi-Fi, TV a cabo</p>
        <a href="{{ url_for('hospedagem.hospedagem') }}" class="btn">Reservar</a>
      </div>
    </div>

    <div class="card">
      <img src="{{ url_for('static', filename='img/quarto2.png.png') }}" alt="Quarto 102">
      <div class="card-content">
        <h3>Quarto 102 - Standard</h3>
        <p>R$ 180,00 / diária</p>
        <p>Cama de casal, banheiro privativo</p>
        <a href="{{ url_for('hospedagem.hospedagem') }}" class="btn">Reservar</a>
      </div>
    </div>

    <!-- Adicione mais quartos dinamicamente -->
  </div>
</body>
</html>
